services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override .env defaults with Docker-internal hostnames
      - DATABASE_URL=postgresql+asyncpg://observator:observator@postgres:5432/observator
      - DATABASE_URL_SYNC=postgresql://observator:observator@postgres:5432/observator
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_HOURS=24
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-true}
      - DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      # Mount source code for hot-reload during development
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
      # Mount data files for demand-insights and data-landscape endpoints
      - ../_master_tables:/app/_master_tables:ro
      - ../_analysis_results.json:/app/_analysis_results.json:ro
    # Override CMD with --reload for development
    command: ["uvicorn", "src.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "src"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: observator
      POSTGRES_USER: observator
      POSTGRES_PASSWORD: observator
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observator"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  qdrant_data:
