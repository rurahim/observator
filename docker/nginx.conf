# =============================================================================
# nginx.conf — Production config for the Observator frontend
# =============================================================================
#
# WHY THIS EXISTS:
# The React app builds to static HTML/JS/CSS files. We need a web server to:
# 1. Serve those static files efficiently with caching headers
# 2. Handle SPA routing (all non-file paths -> index.html)
# 3. Proxy /api/* requests to the backend (when running in docker-compose)
# 4. Add security headers (CSP, HSTS, X-Frame-Options)
# 5. Enable gzip compression to reduce bandwidth
#
# WHAT'S HAPPENING:
# - worker_processes auto: nginx auto-detects CPU cores
# - try_files $uri $uri/ /index.html: SPA fallback routing
# - /api/ proxy_pass: forwards API calls to backend service
# - Security headers block: prevents clickjacking, XSS, MIME sniffing
# - gzip block: compresses text-based assets (JS, CSS, HTML, JSON)
# - Cache-Control headers: long-lived cache for hashed assets, no-cache for index.html
#
# GOTCHAS:
# - The resolver 127.0.0.11 is Docker's internal DNS. Remove it for non-Docker setups.
# - proxy_pass URL must NOT have a trailing slash when using location /api/
#   (otherwise /api/health becomes //health on the backend)
# - index.html must NEVER be cached (Cache-Control: no-cache) or users won't
#   get new deployments until their browser cache expires
#
# PRO TIP:
# In production on AWS, CloudFront handles SSL termination and caching.
# This nginx only needs to serve files and proxy APIs. The security headers
# here are defense-in-depth — CloudFront can also add them via response policies.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Gzip compression — reduces transfer size by 60-80% for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ──────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health check for ALB/ECS ──────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── API Proxy (used in docker-compose, not needed when CloudFront routes /api) ──
        location /api/ {
            # Docker internal DNS resolver
            resolver 127.0.0.11 valid=30s;
            set $backend "http://api:8000";
            proxy_pass $backend;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support (chat streaming)
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Hashed static assets (JS, CSS) — cache aggressively ──────────
        # Vite produces filenames like assets/index-abc123.js
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback — all routes serve index.html ────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must NOT be cached — it contains the asset manifest
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }
    }
}
